# Local Development Database (Optional)
# Uses project root .env (edgelearn-ai/.env)
# For deployment, use Supabase PostgreSQL
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edgelearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

# Note: Run backend and frontend locally with:
# Backend: cd backend && uvicorn main:app --reload
# Frontend: cd frontend && pnpm dev
#
# For production, use Supabase PostgreSQL (free tier available)
