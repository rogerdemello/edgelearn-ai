services:
  - type: web
    name: edgelearn-backend
    env: python
    runtime: python-3.12.8
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
